x-airflow-common:
  &airflow-common
  build:
    context: ./airflow
    dockerfile: airflow.Dockerfile
  env_file: airflow/.env
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=FB0o_zt4e3Ziq3LdUUO7F2Z95cvFFx16hU8jTeR1ASM=
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    - AIRFLOW__API_AUTH__JWT_SECRET=my_jwt_secret
    - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS=admin:admin
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS=True
    - AIRFLOW__CORE__AUTH_MANAGER=airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - airflow-config:/opt/airlfow/airflow.cfg
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    - postgres
  group_add:
      - "0"

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    volumes:
      - airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s


  airflow-init:
    << : *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "Initing Airflow"
        airflow db migrate
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    << : *airflow-common
    command: airflow api-server
    ports:
      - 8080:8080
    container_name: airflow_webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    << : *airflow-common
    command: airflow scheduler
    container_name: airflow_scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    << : *airflow-common
    command: airflow dag-processor
    container_name: airflow_dag_processor
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: rootrootroot
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set dockerminio http://minio:9000 root rootrootroot;
      /usr/bin/mc mb dockerminio/raw;
      /usr/bin/mc mb dockerminio/trusted;
      /usr/bin/mc mb dockerminio/refined;
      exit 0;
      "


  lakekeeper:
    image: &lakekeeper-image ${LAKEKEEPER__SERVER_IMAGE:-quay.io/lakekeeper/catalog:v0.9.1}
    pull_policy: &lakekeeper-pull-policy always
    environment: &lakekeeper-environment
      - LAKEKEEPER__PG_ENCRYPTION_KEY=This-is-NOT-Secure!
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://postgres:postgres@lakekeeper_db:5432/postgres
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://postgres:postgres@lakekeeper_db:5432/postgres
      - LAKEKEEPER__AUTHZ_BACKEND=allowall
    command: [ "serve" ]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8181:8181"

  migrate:
    image: *lakekeeper-image
    pull_policy: *lakekeeper-pull-policy
    environment: *lakekeeper-environment
    restart: "no"
    command: [ "migrate" ]
    depends_on:
      lakekeeper_db:
        condition: service_healthy

  lakekeeper_db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5432 -d postgres" ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 10s
    ports:
      - "5433:5432"
    volumes:
      - lakekeeper-data:/var/lib/postgresql/data

  trino:
    ports:
      - "8081:8080"
    image: "trinodb/trino:471"
    env_file: trino/.env
    volumes:
      - ./trino/etc:/usr/lib/trino/etc:ro
      - ./trino/catalog:/etc/trino/catalog

  superset:
    init: true
    build:
      context: ./superset
      dockerfile: Dockerfile
    volumes:
      - ./superset/superset-data:/app/superset_home
      - ./superset/setup.sh:/app/setup.sh
    entrypoint:
      - bash
      - setup.sh
    ports:
      - '8088:8088'

  superset-postgres:
    init: true
    image: postgres:16
    volumes:
      - superset-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=superset
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=secretsecret
    ports:
      - "5434:5432"

  bootstrap-lakekeeper:
    image: curlimages/curl
    depends_on:
      - lakekeeper
    restart: "no"
    command:
      - -w
      - "%{http_code}"
      - "-X"
      - "POST"
      - "-v"
      - "http://lakekeeper:8181/management/v1/bootstrap"
      - "-H"
      - "Content-Type: application/json"
      - "--data"
      - '{"accept-terms-of-use": true}'
      - "-o"
      - "/dev/null"

  create-warehouse:
    image: curlimages/curl
    depends_on:
      bootstrap-lakekeeper:
        condition: service_completed_successfully
      createbuckets:
        condition: service_completed_successfully
    restart: "no"
    entrypoint: [ "sh", "/home/curl_user/create_warehouse.sh" ]
    volumes:
      - ./lakekeeper/raw.json:/home/curl_user/raw.json
      - ./lakekeeper/trusted.json:/home/curl_user/trusted.json
      - ./lakekeeper/refined.json:/home/curl_user/refined.json
      - ./lakekeeper/create_warehouse.sh:/home/curl_user/create_warehouse.sh
volumes:
  minio-data:
  lakekeeper-data:
  superset-data:
  airflow-data:
  airflow-logs:
  airflow-plugins:
  airflow-config:

networks:
  default:
    name: platform-net
